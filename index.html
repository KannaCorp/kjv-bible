<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>KJV Bible &amp; AI Insights — The complete King James Bible, with context</title>
    <meta name="description" content="The complete King James Version Bible with AI-powered context for any verse, a daily verse, a private journal, favourites and bookmarks. Free on the App Store.">
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%2309090c'/%3E%3Crect x='14.2' y='6' width='3.6' height='20' rx='1.6' fill='%23b9a4e8'/%3E%3Crect x='9' y='11.5' width='14' height='3.4' rx='1.5' fill='%23b9a4e8'/%3E%3C/svg%3E">
    <meta property="og:title" content="KJV Bible &amp; AI Insights">
    <meta property="og:description" content="The complete King James Bible — with context when you want it.">
    <meta property="og:type" content="website">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
    
    <script>document.documentElement.classList.add('js');</script>
    
    <style>
        :root {
            --bg: #09090c; 
            --bg2: #0d0c11; 
            --surface: #161520; 
            --surface2: #1b1a26;
            --line: #272430; 
            --ink: #ece7de; 
            --ink-soft: #bdb8c6; 
            --mute: #8a8694;
            --accent: #b9a4e8; 
            --accent-deep: #7c5cc4;
            --serif: "EB Garamond", Georgia, serif;
            --caps: "Cinzel", Georgia, serif;
            --ui: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            background: var(--bg); 
            color: var(--ink); 
            font-family: var(--ui);
            line-height: 1.6; 
            -webkit-font-smoothing: antialiased; 
            overflow-x: hidden;
        }
        a { color: inherit; text-decoration: none; }
        .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }
        .eyebrow {
            font-family: var(--caps); 
            font-size: .8rem; 
            letter-spacing: .34em; 
            text-transform: uppercase;
            color: var(--mute); 
            display: inline-flex; 
            align-items: center; 
            gap: .6em;
        }
        .eyebrow .spark { width: 1.05em; height: 1.05em; color: var(--accent); }
        .rule { width: 54px; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); margin: 0 auto; }

        /* ---------- CTA ---------- */
        .cta { display: inline-block; line-height: 0; border-radius: 12px; transition: transform .18s ease, filter .18s ease; }
        .cta:hover { transform: translateY(-2px); filter: brightness(1.07); }
        .cta:focus-visible { outline: 3px solid var(--accent); outline-offset: 4px; }
        .badges { display: flex; gap: 14px; align-items: center; flex-wrap: wrap; justify-content: center; }
        .badge { width: auto; display: block; }
        .b-apple { height: 52px; }
        .b-google { height: 58px; }
        .cta-note { display: block; margin-top: 16px; font-size: .85rem; color: var(--mute); letter-spacing: .02em; }

        /* ---------- HERO ---------- */
        .hero { position: relative; padding: 84px 0 70px; overflow: hidden; }
        .hero::before {
            content: ""; 
            position: absolute; 
            top: -22%; 
            left: 50%; 
            transform: translateX(-50%);
            width: 760px; 
            height: 760px; 
            max-width: 130vw;
            background: radial-gradient(circle, rgba(124,92,196,.32), transparent 62%);
            filter: blur(8px); 
            z-index: 0; 
            pointer-events: none;
        }
        .hero .wrap { position: relative; z-index: 1; display: grid; gap: 48px; align-items: center; }
        .cross { width: 30px; height: 38px; color: var(--ink); opacity: .92; margin: 0 auto 22px; display: block; }
        .hero-verse {
            font-family: var(--serif); 
            font-style: italic; 
            font-weight: 500;
            font-size: clamp(2rem, 6.4vw, 3.3rem); 
            line-height: 1.24; 
            letter-spacing: .005em;
            margin: 18px auto 6px; 
            max-width: 18ch;
        }
        .hero-ref { font-family: var(--caps); font-size: .84rem; letter-spacing: .24em; color: var(--accent); margin-bottom: 34px; }
        .hero-divider { width: 46px; height: 1px; background: var(--line); margin: 0 auto 30px; }
        .appname { font-family: var(--serif); font-size: clamp(1.5rem, 4.2vw, 2rem); font-weight: 500; letter-spacing: .01em; }
        .tagline { color: var(--ink-soft); font-size: 1.08rem; max-width: 30ch; margin: 12px auto 30px; }
        .hero-top { text-align: center; }
        .phone {
            display: block; width: 100%; height: auto; border-radius: 30px;
            border: 1px solid var(--line); box-shadow: 0 40px 90px -40px rgba(0,0,0,.9), 0 0 0 1px rgba(185,164,232,.06);
        }
        .phone-wrap { position: relative; max-width: 300px; margin: 46px auto 0; }
        .phone-wrap::after {
            content: ""; 
            position: absolute; 
            inset: -30px -10px; 
            z-index: -1;
            background: radial-gradient(circle, rgba(124,92,196,.22), transparent 70%); 
            filter: blur(10px);
        }

        /* ---------- SECTIONS ---------- */
        section { padding: 74px 0; }
        .sec-head { text-align: center; margin-bottom: 48px; }
        .sec-head .rule { margin: 18px auto 0; }
        .sec-title { font-family: var(--serif); font-size: clamp(1.7rem, 4.6vw, 2.5rem); font-weight: 500; line-height: 1.2; margin-top: 14px; }

        /* Features */
        .features { display: grid; grid-template-columns: 1fr; gap: 1px; background: var(--line); border: 1px solid var(--line); border-radius: 18px; overflow: hidden; }
        .feature { background: var(--bg); padding: 30px 26px; }
        .f-mark { display: inline-flex; color: var(--accent); margin-bottom: 14px; }
        .f-ic { width: 26px; height: 26px; }
        .feature h3 { font-family: var(--serif); font-size: 1.34rem; font-weight: 500; margin-bottom: 7px; letter-spacing: .01em; }
        .feature p { color: var(--ink-soft); font-size: 1rem; }

        /* AI split */
        .ai { background: linear-gradient(180deg, var(--bg), var(--bg2)); }
        .ai-grid { display: grid; gap: 44px; align-items: center; }
        .ai-title { font-family: var(--serif); font-size: clamp(1.8rem, 5vw, 2.7rem); font-weight: 500; line-height: 1.18; margin: 16px 0 20px; }
        .ai-body { color: var(--ink-soft); font-size: 1.08rem; max-width: 46ch; }
        .ai-note {
            margin-top: 22px; padding: 16px 18px; border-left: 2px solid var(--accent-deep);
            background: var(--surface); border-radius: 0 12px 12px 0; color: var(--mute); font-size: .96rem;
        }
        .ai-note strong { color: var(--ink-soft); font-weight: 600; }
        .ai-phone { max-width: 430px; margin: 0 auto; }
        .ai-phone img { width: 100%; height: auto; border-radius: 22px; border: 1px solid var(--line); box-shadow: 0 30px 70px -36px rgba(0,0,0,.9); }

        /* Gallery */
        .gallery { display: flex; gap: 16px; overflow-x: auto; scroll-snap-type: x mandatory; padding: 4px 0 10px; -webkit-overflow-scrolling: touch; scrollbar-width: none; }
        .gallery::-webkit-scrollbar { display: none; }
        .gallery img { width: 100%; height: auto; border-radius: 22px; border: 1px solid var(--line); box-shadow: 0 26px 60px -34px rgba(0,0,0,.9); }
        .gcap { text-align: center; color: var(--mute); font-family: var(--caps); font-size: .72rem; letter-spacing: .2em; text-transform: uppercase; margin-top: 12px; }
        .gcol { display: flex; flex-direction: column; flex: 0 0 66%; scroll-snap-align: center; }

        /* Closing */
        .closing { text-align: center; position: relative; overflow: hidden; }
        .closing::before { content: ""; position: absolute; top: -40%; left: 50%; transform: translateX(-50%); width: 620px; height: 620px; max-width: 120vw; background: radial-gradient(circle, rgba(124,92,196,.26), transparent 62%); z-index: 0; }
        .closing .wrap { position: relative; z-index: 1; }
        .closing .sec-title { margin-bottom: 34px; max-width: 16ch; margin-left: auto; margin-right: auto; }

        /* Footer */
        footer { border-top: 1px solid var(--line); padding: 40px 0; color: var(--mute); font-size: .92rem; }
        .foot { display: flex; flex-wrap: wrap; gap: 14px 28px; align-items: center; justify-content: center; text-align: center; }
        .foot a { color: var(--ink-soft); transition: color .15s; }
        .foot a:hover { color: var(--accent); }
        .foot .dot { color: var(--line); }
        .foot-name { font-family: var(--caps); letter-spacing: .18em; font-size: .78rem; text-transform: uppercase; color: var(--mute); }

        /* Reveal animation */
        .js .reveal { opacity: 0; transform: translateY(18px); transition: opacity .7s ease, transform .7s ease; }
        .js .reveal.in { opacity: 1; transform: none; }

        /* ---------- DESKTOP ---------- */
        @media(min-width: 860px) {
            .hero { padding: 110px 0 96px; }
            .hero .wrap { grid-template-columns: 1.05fr .95fr; gap: 60px; text-align: left; }
            .hero-top { text-align: left; }
            .cross { margin: 0 0 22px; }
            .hero-verse, .tagline { margin-left: 0; margin-right: 0; }
            .phone-wrap { margin: 0 0 0 auto; max-width: 300px; }
            .features { grid-template-columns: repeat(3,1fr); }
            .ai-grid { grid-template-columns: 1fr 1fr; }
            .gallery { display: grid; grid-template-columns: repeat(3,1fr); gap: 20px; max-width: 760px; margin: 0 auto; overflow: visible; }
            .gcol { flex: none; }
        }
        @media(prefers-reduced-motion: reduce) {
            * { scroll-behavior: auto; }
            .js .reveal { transition: none; }
            .cta { transition: none; }
        }
    </style>
</head>
<body>

<header class="hero">
    <div class="wrap">
        <div class="hero-top">
            <svg class="cross" viewBox="0 0 48 60" aria-hidden="true">
                <rect x="20" y="2" width="8" height="56" rx="4" fill="currentColor"/>
                <rect x="7" y="16" width="34" height="8" rx="4" fill="currentColor"/>
            </svg>
            <span class="eyebrow">The King James Version</span>
            <p class="hero-verse">Thy word is a lamp unto my feet, and a light unto my path.</p>
            <p class="hero-ref">Psalm 119:105</p>
            <div class="hero-divider"></div>
            <h1 class="appname">KJV Bible &amp; AI Insights</h1>
            <p class="tagline">The complete King James Bible — with context when you want it.</p>
            <div class="badges">
                <a class="cta appstore" href="https://apps.apple.com/app/apple-store/id6779939039?pt=129034576&ct=web_camp&mt=8" aria-label="Преузми на App Store-у">
                    <img class="badge b-apple" src="https://tools.applemediaservices.com/api/badges/download-on-the-app-store/black/hr-hr?size=250x83" alt="Преузми на App Store-у" width="250" height="83" loading="eager">
                </a>
                <a class="cta googleplay" href="https://play.google.com/store/apps/details?id=com.kanna.bible&referrer=utm_source%3Dweb%26utm_medium%3Dbadge" aria-label="Преузми преко Google Play">
                    <img class="badge b-google" src="googleplay-en.svg" alt="Преузми преко Google Play" width="239" height="71" loading="eager">
                </a>
            </div>
            <span class="cta-note">Free · iPhone · core reading works offline</span>
        </div>
        <div class="phone-wrap">
            <!-- Zamenjen nepotpuni base64 privremenim placeholderom radi validnosti koda -->
            <img class="phone" src="https://via.placeholder.com/300x600" alt="App Screenshot">
        </div>
    </div>
</header>

</body>
</html>
